<div class="grid grid-cols-3 gap-4 mb-8">
    <button onclick="changeProducer('1')" id="p1" class="p-4 border-2 rounded-2xl bg-white hover:border-red-500 transition">
        <span class="text-2xl block">🏢</span>
        <span class="text-xs font-bold uppercase">Producent 1</span>
    </button>
    <button onclick="changeProducer('2')" id="p2" class="p-4 border-2 rounded-2xl bg-white hover:border-red-500 transition">
        <span class="text-2xl block">🏭</span>
        <span class="text-xs font-bold uppercase">Producent 2</span>
    </button>
    <button onclick="changeProducer('3')" id="p3" class="p-4 border-2 rounded-2xl bg-white hover:border-red-500 transition">
        <span class="text-2xl block">🏗️</span>
        <span class="text-xs font-bold uppercase">Producent 3</span>
    </button>
</div>

<div id="formSection" class="opacity-30 pointer-events-none transition-all duration-500">
    <div class="bg-white p-6 rounded-3xl shadow-lg border border-slate-200">
        <div class="mb-4">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Wybierz Kod</label>
            <select id="codeDropdown" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-lg outline-none focus:border-red-500 transition-colors">
                <option>Wybierz producenta...</option>
            </select>
        </div>
        </div>
</div>

<script>
let currentProd = null;

async function changeProducer(id) {
    currentProd = id;
    // Wizualne zaznaczenie przycisku
    document.querySelectorAll('[id^="p"]').forEach(btn => btn.classList.remove('border-red-500', 'bg-red-50'));
    document.getElementById('p'+id).classList.add('border-red-500', 'bg-red-50');
    
    // Pobieranie kodów dla tego producenta
    const response = await fetch(`/api/codes?prod_id=${id}`);
    const data = await response.json();
    
    const dropdown = document.getElementById('codeDropdown');
    dropdown.innerHTML = data.codes.map(c => `<option value="${c}">${c}</option>`).join('');
    
    // Odblokowanie formularza
    document.getElementById('formSection').classList.remove('opacity-30', 'pointer-events-none');
}
</script>
