<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Antyramy.eu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .option-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .option-card.active { 
            border-color: #ef4444; 
            background-color: #fff1f2;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.1);
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ef4444;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-10">
    <div class="max-w-xl mx-auto px-4 pt-8">
        <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-200 mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-red-600 leading-none">ANTYRAMY.EU</h1>
                <p class="text-slate-400 text-xs mt-1 font-semibold uppercase tracking-widest">Kalkulator Wycen</p>
            </div>
            <button onclick="location.reload()" class="text-slate-300 hover:text-red-500 transition text-xl">🔄</button>
        </div>

        <div class="bg-white rounded-3xl p-8 shadow-xl border border-slate-200 mb-6">
            <label class="block text-sm font-bold text-slate-500 uppercase mb-3">Kod listwy i wymiary</label>
            <div class="relative">
                <input type="text" id="calcInput" onkeyup="if(event.key==='Enter') calculate()" 
                       placeholder="np. 3484 50 70" 
                       class="w-full text-2xl font-bold p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-red-500 focus:bg-white outline-none transition-all pr-16">
                <button onclick="calculate()" class="absolute right-2 top-2 bottom-2 bg-red-600 text-white px-4 rounded-xl font-bold hover:bg-red-700 transition">OK</button>
            </div>
            <p class="mt-2 text-slate-400 text-xs italic text-center">Wpisz kod, spację i wymiary (szerokość wysokość)</p>
        </div>

        <div id="resultBox" class="hidden space-y-4">
            <div class="bg-white rounded-3xl p-8 shadow-2xl border border-slate-200">
                <div id="details" class="flex justify-between items-center mb-6 pb-4 border-b border-slate-100">
                    <span class="text-slate-800 font-bold" id="labelKod"></span>
                    <div id="loading" class="hidden"><span class="loader"></span></div>
                </div>
                
                <div class="grid grid-cols-1 gap-3" id="optionsGrid">
                    </div>

                <div class="mt-6 p-4 bg-slate-50 rounded-2xl border border-slate-200">
                    <label class="flex items-center space-x-3 cursor-pointer">
                        <input type="checkbox" id="extraCheck" onchange="renderOptions()" class="w-5 h-5 accent-red-600">
                        <span class="text-sm font-bold text-slate-600">Dodatkowa usługa / montaż</span>
                    </label>
                    <input type="number" id="extraValue" value="0" oninput="renderOptions()"
                           class="w-full mt-3 p-3 rounded-xl border border-slate-200 focus:border-red-500 outline-none font-bold">
                </div>

                <div class="mt-10 bg-slate-900 rounded-[2rem] p-8 text-white relative overflow-hidden">
                    <div class="relative z-10">
                        <p class="text-xs uppercase opacity-50 font-bold tracking-widest mb-1">Razem do zapłaty</p>
                        <h2 id="totalPrice" class="text-5xl font-black mb-6">0.00 <span class="text-xl">PLN</span></h2>
                        
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="downloadPDF()" class="bg-red-600 hover:bg-red-700 text-white py-4 rounded-2xl font-bold transition flex items-center justify-center gap-2">
                                <span>📄 PDF</span>
                            </button>
                            <a id="smsBtn" href="#" class="bg-white/10 hover:bg-white/20 text-white py-4 rounded-2xl font-bold transition flex items-center justify-center gap-2">
                                <span>📱 SMS</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let data = null;
        let selected = new Set();

        async function calculate() {
            const q = document.getElementById('calcInput').value;
            if(!q) return;
            
            document.getElementById('loading').classList.remove('hidden');
            
            try {
                const res = await fetch(`/api/calculate?query=${encodeURIComponent(q)}`);
                data = await res.json();

                if(data.error) {
                    alert(data.error);
                    return;
                }

                document.getElementById('resultBox').classList.remove('hidden');
                document.getElementById('labelKod').innerHTML = `Listwa <span class="text-red-600">${data.kod}</span> • ${data.szer}x${data.wys} cm`;
                renderOptions();
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function renderOptions() {
            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = '';
            const items = [
                { id: 'listwa', n: 'Sama listwa', p: data.results.listwa },
                { id: 'oprawa', n: 'Z oprawą kompletna', p: data.results.oprawa },
                { id: 'float', n: 'Szyba Float 2mm', p: data.results.float },
                { id: 'anty', n: 'Szyba Antyreflex', p: data.results.anty },
                { id: 'hdf', n: 'Płyta HDF 3mm', p: data.results.hdf },
                { id: 'pp', n: 'Passe-partout', p: data.results.pp }
            ];

            items.forEach(item => {
                const isActive = selected.has(item.id);
                const card = document.createElement('div');
                card.className = `option-card p-4 rounded-2xl border-2 cursor-pointer flex justify-between items-center ${isActive ? 'active' : 'border-slate-100 bg-slate-50/50 hover:bg-white'}`;
                card.onclick = () => {
                    if(selected.has(item.id)) selected.delete(item.id);
                    else selected.add(item.id);
                    renderOptions();
                };
                card.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-6 h-6 rounded-full border-2 flex items-center justify-center ${isActive ? 'border-red-600 bg-red-600 text-white' : 'border-slate-300'}">
                            ${isActive ? '✓' : ''}
                        </div>
                        <span class="font-semibold text-slate-700">${item.n}</span>
                    </div>
                    <span class="font-black text-slate-900">${item.p.toFixed(2)} zł</span>
                `;
                grid.appendChild(card);
            });

            // Obliczanie sumy
            let total = Array.from(selected).reduce((sum, id) => {
                const item = items.find(i => i.id === id);
                return sum + (item ? item.p : 0);
            }, 0);

            // Dodanie usługi dodatkowej
            const extraCheck = document.getElementById('extraCheck').checked;
            const extraVal = parseFloat(document.getElementById('extraValue').value) || 0;
            if(extraCheck) total += extraVal;

            document.getElementById('totalPrice').innerHTML = `${total.toFixed(2)} <span class="text-xl">PLN</span>`;

            // Przygotowanie SMS
            const smsBody = `Wycena oprawy ${data.kod} (${data.szer}x${data.wys}cm): ${total.toFixed(2)} PLN. Zapraszamy! Antyramy.eu`;
            document.getElementById('smsBtn').href = `sms:?body=${encodeURIComponent(smsBody)}`;
        }

        function downloadPDF() {
            const total = document.getElementById('totalPrice').innerText.split(' ')[0];
            const itemsStrings = [];
            selected.forEach(id => {
                const el = document.querySelector(`[onclick*="${id}"] span.font-semibold`).innerText;
                itemsStrings.push(el);
            });
            if(document.getElementById('extraCheck').checked) {
                itemsStrings.push(`Usługa dodatkowa: ${document.getElementById('extraValue').value} zł`);
            }
            window.location.href = `/api/pdf?kod=${data.kod}&s=${data.szer}&w=${data.wys}&suma=${total}&opis=${encodeURIComponent(itemsStrings.join('|'))}`;
        }
    </script>
</body>
</html>
