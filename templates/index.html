<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Antyramy.eu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .option-card.active { border-color: #ef4444; background-color: #fef2f2; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">
    <div class="max-w-lg mx-auto p-4 pt-10">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
            <div class="p-6 bg-red-600 text-white">
                <h1 class="text-2xl font-black uppercase tracking-tight">Antyramy.eu</h1>
                <p class="opacity-80 text-sm">System szybkiej wyceny opraw</p>
            </div>

            <div class="p-6 border-b">
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Wpisz kod i wymiary</label>
                <input type="text" id="calcInput" placeholder="np. 3484 50 70" 
                       class="w-full text-2xl font-bold p-3 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-red-500 outline-none transition-all">
                <button onclick="calculate()" class="w-full mt-4 bg-gray-900 text-white py-4 rounded-2xl font-bold hover:bg-black transition">Przelicz</button>
            </div>

            <div id="resultBox" class="p-6 hidden animate-in fade-in">
                <div id="details" class="mb-6 text-sm text-gray-500 font-medium"></div>
                
                <div class="grid grid-cols-1 gap-3" id="optionsGrid">
                    </div>

                <div class="mt-8 p-6 bg-gray-900 rounded-3xl text-white">
                    <p class="text-xs uppercase opacity-60 font-bold mb-1">Razem brutto</p>
                    <div class="flex justify-between items-end">
                        <h2 id="totalPrice" class="text-4xl font-black">0.00 PLN</h2>
                        <button onclick="downloadPDF()" class="bg-red-600 p-3 rounded-xl hover:bg-red-700">📄 PDF</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let data = null;
        let selected = new Set();

        async function calculate() {
            const q = document.getElementById('calcInput').value;
            const res = await fetch(`/api/calculate?query=${encodeURIComponent(q)}`);
            data = await res.json();

            if(data.error) { alert(data.error); return; }

            document.getElementById('resultBox').classList.remove('hidden');
            document.getElementById('details').innerHTML = `Listwa: ${data.kod} | Rozmiar: ${data.szer}x${data.wys} cm`;
            
            renderOptions();
        }

        function renderOptions() {
            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = '';
            const items = [
                { id: 'listwa', n: 'Sama listwa', p: data.results.listwa },
                { id: 'oprawa', n: 'Z oprawą', p: data.results.oprawa },
                { id: 'float', n: 'Szyba Float', p: data.results.float },
                { id: 'anty', n: 'Szyba Antyreflex', p: data.results.anty },
                { id: 'hdf', n: 'Płyta HDF', p: data.results.hdf },
                { id: 'pp', n: 'Passe-partout', p: data.results.pp }
            ];

            items.forEach(item => {
                const isActive = selected.has(item.id);
                const card = document.createElement('div');
                card.className = `option-card p-4 rounded-2xl border-2 cursor-pointer flex justify-between items-center transition ${isActive ? 'active' : 'border-gray-100 hover:border-gray-200'}`;
                card.onclick = () => {
                    if(selected.has(item.id)) selected.delete(item.id);
                    else selected.add(item.id);
                    renderOptions();
                };
                card.innerHTML = `<span class="font-bold text-gray-700">${item.n}</span><span class="font-black text-red-600">${item.p.toFixed(2)} zł</span>`;
                grid.appendChild(card);
            });

            const total = Array.from(selected).reduce((sum, id) => sum + items.find(i => i.id === id).p, 0);
            document.getElementById('totalPrice').innerText = total.toFixed(2) + " PLN";
        }

        function downloadPDF() {
            const total = document.getElementById('totalPrice').innerText.split(' ')[0];
            const opis = Array.from(selected).join('|');
            window.location.href = `/api/pdf?kod=${data.kod}&s=${data.szer}&w=${data.wys}&suma=${total}&opis=${encodeURIComponent(opis)}`;
        }
    </script>
</body>
</html>
