<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Antyramy.eu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .prod-btn.active { border-color: #ef4444; background-color: #fef2f2; }
        .option-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .option-card.active { 
            border-color: #ef4444; background-color: #fff1f2;
            transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.1);
        }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #ef4444; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800 pb-12">
    <div class="max-w-xl mx-auto px-4 pt-8 space-y-6">
        
        <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-200 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-red-600 leading-none">ANTYRAMY.EU</h1>
                <p class="text-slate-400 text-xs mt-1 font-bold uppercase tracking-widest">Kalkulator Wycen</p>
            </div>
            <button onclick="location.reload()" class="bg-slate-50 hover:bg-slate-100 p-3 rounded-xl transition text-xl">🔄</button>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-md border border-slate-200">
            <h2 class="text-xs font-black text-slate-400 uppercase mb-4 tracking-widest">1. Wybierz Producenta</h2>
            <div class="grid grid-cols-3 gap-3">
                <button onclick="changeProducer('1')" id="btn-prod-1" class="prod-btn p-4 rounded-2xl border-2 border-slate-100 hover:border-red-200 transition text-center group">
                    <span class="text-3xl block mb-2 group-hover:scale-110 transition duration-300">🏢</span>
                    <span class="text-[10px] font-bold text-slate-600 uppercase">Producent 1</span>
                </button>
                <button onclick="changeProducer('2')" id="btn-prod-2" class="prod-btn p-4 rounded-2xl border-2 border-slate-100 hover:border-red-200 transition text-center group">
                    <span class="text-3xl block mb-2 group-hover:scale-110 transition duration-300">🏭</span>
                    <span class="text-[10px] font-bold text-slate-600 uppercase">Producent 2</span>
                </button>
                <button onclick="changeProducer('3')" id="btn-prod-3" class="prod-btn p-4 rounded-2xl border-2 border-slate-100 hover:border-red-200 transition text-center group">
                    <span class="text-3xl block mb-2 group-hover:scale-110 transition duration-300">🏗️</span>
                    <span class="text-[10px] font-bold text-slate-600 uppercase">Producent 3</span>
                </button>
            </div>
        </div>

        <div id="formSection" class="bg-white p-8 rounded-3xl shadow-md border border-slate-200 opacity-40 pointer-events-none transition-all duration-500">
            <h2 class="text-xs font-black text-slate-400 uppercase mb-4 tracking-widest">2. Parametry Oprawy</h2>
            <div class="space-y-5">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">KOD LISTWY</label>
                    <select id="codeDropdown" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-red-500 font-bold text-lg text-slate-700 cursor-pointer">
                        <option value="">Najpierw wybierz producenta...</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">SZEROKOŚĆ (cm)</label>
                        <input type="number" id="inpSzer" value="30" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-red-500 outline-none font-black text-2xl text-slate-800 text-center">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">WYSOKOŚĆ (cm)</label>
                        <input type="number" id="inpWys" value="40" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-red-500 outline-none font-black text-2xl text-slate-800 text-center">
                    </div>
                </div>
                <button onclick="runCalculation()" class="w-full bg-red-600 text-white py-5 rounded-2xl font-black text-xl hover:bg-red-700 transition shadow-lg shadow-red-200 flex justify-center items-center gap-2">
                    <span>PRZELICZ</span>
                    <div id="calcLoading" class="hidden"><span class="loader border-white border-t-transparent w-5 h-5"></span></div>
                </button>
            </div>
        </div>

        <div id="resultBox" class="hidden space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-500">
            <div class="bg-white rounded-3xl p-8 shadow-xl border border-slate-200">
                <div class="flex justify-between items-center mb-6 pb-4 border-b border-slate-100">
                    <span class="text-slate-800 font-bold text-sm" id="labelKod"></span>
                </div>
                
                <div class="grid grid-cols-1 gap-3" id="optionsGrid">
                    </div>

                <div class="mt-6 p-5 bg-slate-50 rounded-2xl border border-slate-100">
                    <label class="flex items-center space-x-3 cursor-pointer mb-3">
                        <input type="checkbox" id="extraCheck" onchange="updateTotal()" class="w-5 h-5 accent-red-600 rounded">
                        <span class="text-sm font-bold text-slate-700">Usługa dodatkowa / Inne</span>
                    </label>
                    <input type="number" id="extraValue" value="0" oninput="updateTotal()" class="w-full p-4 rounded-xl border-2 border-slate-200 focus:border-red-500 outline-none font-bold text-lg">
                </div>

                <div class="mt-8 bg-slate-900 rounded-[2rem] p-8 text-white">
                    <p class="text-[10px] uppercase opacity-60 font-black tracking-widest mb-1">RAZEM DO ZAPŁATY (BRUTTO)</p>
                    <h2 id="totalPrice" class="text-5xl font-black mb-8 text-white">0.00 <span class="text-xl text-slate-400">PLN</span></h2>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="downloadPDF()" class="bg-red-600 hover:bg-red-700 text-white py-4 rounded-xl font-bold transition">📄 Pobierz PDF</button>
                        <a id="smsBtn" href="#" class="bg-slate-800 hover:bg-slate-700 text-white py-4 rounded-xl font-bold transition flex items-center justify-center">📱 Wyślij SMS</a>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        let currentProd = null;
        let calcData = null;
        let selectedOptions = new Set();

        async function changeProducer(id) {
            currentProd = id;
            
            document.querySelectorAll('.prod-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-prod-${id}`).classList.add('active');
            
            const dropdown = document.getElementById('codeDropdown');
            dropdown.innerHTML = '<option>Ładowanie kodów...</option>';
            
            try {
                const res = await fetch(`/api/codes?prod_id=${id}`);
                const data = await res.json();
                
                if(data.codes && data.codes.length > 0) {
                    dropdown.innerHTML = data.codes.map(c => `<option value="${c}">${c}</option>`).join('');
                    document.getElementById('formSection').classList.remove('opacity-40', 'pointer-events-none');
                } else {
                    dropdown.innerHTML = '<option>Brak kodów dla tego producenta</option>';
                }
            } catch (err) {
                dropdown.innerHTML = '<option>Błąd połączenia</option>';
            }
        }

        async function runCalculation() {
            if(!currentProd) return alert("Wybierz producenta!");
            
            const kod = document.getElementById('codeDropdown').value;
            const szer = document.getElementById('inpSzer').value;
            const wys = document.getElementById('inpWys').value;

            document.getElementById('calcLoading').classList.remove('hidden');

            try {
                const res = await fetch(`/api/calculate?prod_id=${currentProd}&kod=${encodeURIComponent(kod)}&szer=${szer}&wys=${wys}`);
                
                // Nasz nowy bezpiecznik!
                if(!res.ok) throw new Error("Błąd serwera: Python napotkał problem z odczytem plików.");
                
                const result = await res.json();

                if(result.error) {
                    alert(result.error);
                    return;
                }

                calcData = result;
                calcData.szer = szer;
                calcData.wys = wys;
                
                document.getElementById('resultBox').classList.remove('hidden');
                document.getElementById('labelKod').innerHTML = `Wybrana listwa: <span class="text-red-600 text-lg">${calcData.kod}</span> <span class="text-slate-400 ml-2">${szer} x ${wys} cm</span>`;
                
                renderCards();
            } catch (err) {
                alert("CRITICAL ERROR: " + err.message + " Sprawdź logi Vercel!");
            } finally {
                document.getElementById('calcLoading').classList.add('hidden');
            }
        }

        function renderCards() {
            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = '';
            
            const items = [
                { id: 'listwa', name: 'Sama listwa (docięta)', price: calcData.results.listwa },
                { id: 'oprawa', name: 'Kompletna z oprawą', price: calcData.results.oprawa },
                { id: 'float', name: 'Szyba Float', price: calcData.results.float },
                { id: 'anty', name: 'Szyba Antyreflex', price: calcData.results.anty },
                { id: 'hdf', name: 'Tył (Płyta HDF)', price: calcData.results.hdf },
                { id: 'karton', name: 'Tył (Karton)', price: calcData.results.karton },
                { id: 'pp', name: 'Passe-partout', price: calcData.results.pp }
            ];

            items.forEach(item => {
                const isActive = selectedOptions.has(item.id);
                const card = document.createElement('div');
                card.className = `option-card p-4 rounded-2xl border-2 cursor-pointer flex justify-between items-center ${isActive ? 'active' : 'border-slate-100 bg-slate-50 hover:bg-white'}`;
                card.onclick = () => {
                    if(selectedOptions.has(item.id)) selectedOptions.delete(item.id);
                    else selectedOptions.add(item.id);
                    renderCards(); 
                };
                
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-6 h-6 rounded-md border-2 flex items-center justify-center transition ${isActive ? 'border-red-600 bg-red-600 text-white' : 'border-slate-300'}">
                            ${isActive ? '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>' : ''}
                        </div>
                        <span class="font-bold text-sm ${isActive ? 'text-red-900' : 'text-slate-600'}">${item.name}</span>
                    </div>
                    <span class="font-black text-lg ${isActive ? 'text-red-600' : 'text-slate-800'}">${item.price.toFixed(2)} zł</span>
                `;
                grid.appendChild(card);
            });

            updateTotal();
        }

        function updateTotal() {
            let total = 0;
            selectedOptions.forEach(id => total += calcData.results[id]);

            if(document.getElementById('extraCheck').checked) {
                total += parseFloat(document.getElementById('extraValue').value) || 0;
            }

            document.getElementById('totalPrice').innerHTML = `${total.toFixed(2)} <span class="text-xl text-slate-400">PLN</span>`;
            
            const smsBody = `Wycena: ${calcData.kod} (${calcData.szer}x${calcData.wys}cm). Kwota: ${total.toFixed(2)} PLN. Antyramy.eu`;
            document.getElementById('smsBtn').href = `sms:?body=${encodeURIComponent(smsBody)}`;
        }

        function downloadPDF() {
            if(!calcData) return;
            const total = document.getElementById('totalPrice').innerText.split(' ')[0];
            
            let opis = [];
            selectedOptions.forEach(id => {
                let name = "";
                if(id==='listwa') name = "Sama listwa";
                if(id==='oprawa') name = "Z oprawa";
                if(id==='float') name = "Szyba Float";
                if(id==='anty') name = "Szyba Antyreflex";
                if(id==='hdf') name = "Tył HDF";
                if(id==='karton') name = "Tył Karton";
                if(id==='pp') name = "Passe-partout";
                opis.push(`${name}: ${calcData.results[id].toFixed(2)} PLN`);
            });

            if(document.getElementById('extraCheck').checked) {
                opis.push(`Inne: ${document.getElementById('extraValue').value} PLN`);
            }

            const url = `/api/pdf?kod=${calcData.kod}&s=${calcData.szer}&w=${calcData.wys}&suma=${total}&opis=${encodeURIComponent(opis.join('|'))}`;
            window.location.href = url;
        }
    </script>
</body>
</html>
